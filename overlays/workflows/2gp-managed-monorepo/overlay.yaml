schema_version: 3
kind: workflow
name: 2gp-managed-monorepo
source:
  apex:
    - force-app/*/main/default/classes
  lwc:
    - force-app/*/main/default/lwc
  triggers:
    - force-app/*/main/default/triggers
  flows:
    - force-app/*/main/default/flows
  objects:
    - force-app/*/main/default/objects
  permissionsets:
    - force-app/*/main/default/permissionsets
  permissionsetgroups: []
  profiles:
    - unpackaged-metadata/profiles
  layouts:
    - force-app/*/main/default/layouts
  recordtypes:
    - force-app/*/main/default/objects/*/recordTypes
  approval_processes:
    - unpackaged-metadata/approvalProcesses
  unpackaged:
    - unpackaged-metadata/**
docs:
  specs: []
  screens: []
  roadmap: []
  technical: []
  runbooks: []
packaging:
  package_dirs:
    - force-app/*
  package_aliases: []
  namespace:
  dependencies: []
  unpackaged_post_deploy:
    - unpackaged-metadata/**
  install_validation: []
  upgrade_validation: []
security:
  permission_sets:
    user: []
    admin: []
    elevated: []
  permission_set_groups: []
  muting_permission_sets: []
  custom_permissions: []
  licenses: []
  record_type_assignments: []
  ui_visibility: []
org_bootstrap:
  scratch_def:
  default_alias:
  dev_hub_alias:
  feature_setup: []
  settings_setup: []
  permission_assignments: []
  user_setup: []
  seed: []
  manual_steps: []
quality_gates:
  api_version_check:
  lint: []
  unit_tests: []
  integration_tests: []
  smoke_tests: []
  blocking_rules:
    - package dir ごとの deploy 順序が解決していること
  static_analysis:
    commands: []
    thresholds:
      critical_max: 0
      warning_max:
      advisory_max:
    blocking_rules:
      - Critical が 1 件でもあれば FAIL
context_pruning:
  roots:
    source:
      - source.apex
      - source.lwc
      - source.triggers
      - source.flows
      - source.objects
    docs:
      - docs.specs
      - docs.screens
      - docs.technical
  dependency_hints:
    apex_tests:
      - '*Test.cls'
    lwc_tests:
      - __tests__
notes:
  - package dir 単位で deploy / test / review 対象を分ける
